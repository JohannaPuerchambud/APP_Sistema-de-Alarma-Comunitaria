<div class="layout">
  <header class="mobile-topbar">
    <button type="button" class="mobile-menu-button" (click)="toggleMobileMenu()" [attr.aria-expanded]="mobileMenuOpen" aria-controls="main-sidebar" [attr.aria-label]="mobileMenuOpen ? 'Cerrar menú principal' : 'Abrir menú principal'">
      <i class="bi" [ngClass]="mobileMenuOpen ? 'bi-x-lg' : 'bi-list'"></i>
    </button>
    <strong>Alarma Comunitaria</strong>
  </header>
  <!-- Sidebar -->
  <nav id="main-sidebar" class="sidebar" [class.mobile-open]="mobileMenuOpen">
    <div class="sidebar-header text-center">
      <h5>Alarma Comunitaria</h5>
      <hr />
      <div class="user-info">
        <i class="bi bi-person-circle"></i>
        <div>
          <strong>{{ userName }} {{ userLastName }}</strong
          ><br />
          <small>{{ userRole }}</small>
        </div>
      </div>
      <hr />
    </div>

    <ul class="menu list-unstyled">
      <li *ngIf="auth.isAdminGeneral() || auth.isAdminBarrio()">
        <a
          routerLink="/dashboard"
          (click)="closeMobileMenu()" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <i class="bi bi-speedometer2"></i>
          Dashboard
        </a>
      </li>
      <li *ngIf="auth.isAdminGeneral() || auth.isAdminBarrio()">
        <a
          routerLink="/users"
          (click)="closeMobileMenu()" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <i class="bi bi-people"></i>
          {{ auth.isAdminBarrio() ? 'Habitantes de mi barrio' : 'Usuarios' }}
        </a>
      </li>
      <li *ngIf="auth.isAdminGeneral()">
        <a
          routerLink="/neighborhoods"
          (click)="closeMobileMenu()" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <i class="bi bi-building"></i>
          Barrios
        </a>
      </li>

      <li *ngIf="auth.isAdminGeneral()">
        <a routerLink="/upcs" (click)="closeMobileMenu()" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-shield-check"></i>
          Gestión de UPCs
        </a>
      </li>

      <li class="logout">
        <a (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          Salir
        </a>
      </li>
    </ul>
  </nav>
  <button *ngIf="mobileMenuOpen" type="button" class="sidebar-backdrop" (click)="closeMobileMenu()" aria-label="Cerrar menú"></button>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
